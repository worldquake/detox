spring:
  application:
    name: DeToX
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  http:
    converters:
      preferred-json-mapper: jackson2
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
  cloud:
    config:
      enabled: false
  flyway:
    enabled: false
  devtools:
    restart:
      enabled: false
  shell:
    history:
      name: ${target}/shell.log
    help:
      enabled: true
      long-names: help
      short-names: h
      command: help
    script:
      enabled: true
    noninteractive:
      enabled: true
    interactive:
      enabled: true
  web:
    error:
      whitelabel:
        enabled: false